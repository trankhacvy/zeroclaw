workspace_dir = "/data/workspace"
config_path = "/etc/zeroclaw/config.toml"
api_key = ""
default_provider = "openrouter"
default_model = "google/gemini-3.1-flash-lite-preview"
default_temperature = 0.7

[gateway]
port = 42617
host = "[::]"
allow_public_bind = true

[autonomy]
level = "full"
workspace_only = false
require_approval_for_medium_risk = false
block_high_risk_commands = false
allowed_commands = [
    "git", "npm", "cargo", "ls", "cat", "grep", "find", "echo", "pwd",
    "wc", "head", "tail", "date", "curl", "wget", "python3", "python",
    "node", "zeroclaw", "sh", "bash", "mkdir", "cp", "mv", "rm",
    "touch", "chmod", "sed", "awk", "sort", "uniq", "tr", "cut",
    "jq", "xargs", "env", "printenv", "which", "whoami"
]
forbidden_paths = []
max_actions_per_hour = 10000
max_cost_per_day_cents = 100000

[http_request]
enabled = true
allowed_domains = ["*"]

[web_fetch]
enabled = true
allowed_domains = ["*"]

[browser]
enabled = false

[security]
[security.sandbox]
backend = "none"
enabled = false
